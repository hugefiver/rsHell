name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # === Linux ===
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libssh2-1-dev libssl-dev pkg-config

      # === macOS ===
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gtk4 libssh2 openssl pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl)/lib/pkgconfig:$(brew --prefix libssh2)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> $GITHUB_ENV

      # === Windows (GTK4 via gvsbuild, OpenSSL/libssh2 via vcpkg) ===
      - uses: actions/setup-python@v5
        if: runner.os == 'Windows'
        with:
          python-version: '3.12'

      - name: Cache gvsbuild
        if: runner.os == 'Windows'
        id: cache-gtk
        uses: actions/cache@v4
        with:
          path: C:\gtk-build
          key: gvsbuild-gtk4-v1

      - name: Build GTK4 via gvsbuild
        if: runner.os == 'Windows' && steps.cache-gtk.outputs.cache-hit != 'true'
        run: |
          pip install gvsbuild
          gvsbuild build gtk4

      - name: Cache vcpkg packages
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-static-md-v1

      - name: Install OpenSSL and libssh2 (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install openssl:x64-windows-static-md libssh2:x64-windows-static-md

      - name: Setup Windows environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gtkRoot = "C:\gtk-build\gtk\x64\release"
          echo "PKG_CONFIG_PATH=$gtkRoot\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "LIB=$gtkRoot\lib" >> $env:GITHUB_ENV
          echo "$gtkRoot\bin" >> $env:GITHUB_PATH
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - uses: Swatinem/rust-cache@v2

      - run: cargo check
      - run: cargo test --lib
      - run: cargo clippy -- -D warnings
